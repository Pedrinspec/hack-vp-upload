name: CI/CD — hack-vp-upload

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hack-vp-upload
  ECS_CLUSTER: hack-vp-sandbox-cluster
  ECS_SERVICE: hack-vp-sandbox-hack-vp-upload
  CONTAINER_NAME: hack-vp-upload

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build com Maven
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Executar testes unitários
        run: mvn test --no-transfer-progress

  deploy:
    name: Build Docker & Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS Academy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Gerar image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "image_tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build e Push da imagem Docker para ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ steps.tags.outputs.image_tag }}
        run: |
          docker build \
            -f infra/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --label "git-sha=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Baixar task definition atual
        run: |
          aws ecs describe-task-definition \
            --task-definition hack-vp-sandbox-hack-vp-upload \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Atualizar imagem na task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy no ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:           5

      # AWS Academy: credenciais expiram a cada 4h.
      # Atualiza key + secret + TOKEN no SSM para as ECS tasks acessarem S3.
      - name: Renovar credenciais AWS no SSM Parameter Store
        if: success()
        run: |
          aws ssm put-parameter \
            --name "/hack-vp/sandbox/aws/access-key" \
            --value "${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --type SecureString \
            --overwrite

          aws ssm put-parameter \
            --name "/hack-vp/sandbox/aws/secret-key" \
            --value "${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --type SecureString \
            --overwrite

          aws ssm put-parameter \
            --name "/hack-vp/sandbox/aws/session-token" \
            --value "${{ secrets.AWS_SESSION_TOKEN }}" \
            --type SecureString \
            --overwrite

      - name: Sumário do Deploy
        if: always()
        run: |
          echo "### Deploy hack-vp-upload" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagem**: ${{ steps.build-image.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: ${{ env.ECS_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.ECS_SERVICE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
